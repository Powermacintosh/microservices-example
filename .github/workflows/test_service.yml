name: CI | test_service

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      db_tasks_app_test:
        image: postgres:17
        env:
          POSTGRES_USER: ${{ vars.TEST_TASKS_DB_USER }}
          POSTGRES_PASSWORD: ${{ vars.TEST_TASKS_DB_PASS }}
          POSTGRES_DB: ${{ vars.TEST_TASKS_DB_NAME }}
        ports:
          - "5432:5432"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./tasks
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi --no-root

      - name: Run tests
        working-directory: ./tasks
        run: |
          poetry run pytest
